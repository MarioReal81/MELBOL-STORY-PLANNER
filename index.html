<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELBOL Story Planner</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --accent-color: #bb86fc;
            --text-color: #e1e1e6;
            --text-muted: #a0a0b0;
            --border-color: #2e2e36;
            --danger-color: #cf6679;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 260px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 12px 15px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--border-color);
            color: var(--accent-color);
        }

        /* Main Content Area */
        #main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .story-selector {
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Grid & Card Layouts */
        .section-panel {
            display: none;
        }

        .section-panel.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        button.primary-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button.primary-btn:hover {
            opacity: 0.9;
        }

        /* Form elements */
        input, select, textarea {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        /* Grid Systems */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Timeline Styles */
        .timeline-container {
            border-left: 3px solid var(--accent-color);
            padding-left: 20px;
            margin-left: 10px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo">MELBOL Planner</div>
        <button class="nav-btn active" onclick="switchSection('story')">1. Stories</button>
        <button class="nav-btn" onclick="switchSection('characters')">2. Characters</button>
        <button class="nav-btn" onclick="switchSection('worldbuilding')">3. Worldbuilding</button>
        <button class="nav-btn" onclick="switchSection('chapters')">4. Chapters & Arcs</button>
        <button class="nav-btn" onclick="switchSection('timeline')">5. Timeline</button>
        <button class="nav-btn" onclick="switchSection('themes')">6. Themes</button>
        <button class="nav-btn" onclick="switchSection('ideas')">7. Ideas</button>
    </div>

    <div id="main-content">
        <div class="header-bar">
            <h1 id="current-section-title">Story Management</h1>
            <div>
                <label for="active-story-select">Active Story: </label>
                <select id="active-story-select" class="story-selector" onchange="changeActiveStory(this.value)">
                    </select>
            </div>
        </div>

        <div id="section-story" class="section-panel active">
            <h2>Your Stories (Max 5)</h2>
            <button class="primary-btn" onclick="openStoryModal()">Create New Story</button>
            <div id="stories-list" class="grid-3"></div>
        </div>

        <div id="section-characters" class="section-panel">
            <h2>Characters</h2>
            <button class="primary-btn" onclick="addCharacter()">Add Character</button>
            <div id="characters-list" class="grid-3"></div>
        </div>

        <div id="section-worldbuilding" class="section-panel">
            <h2>Worldbuilding</h2>
            
            <h3>Map & Geography</h3>
            <input type="file" id="map-upload" accept="image/*" onchange="uploadMap(event)" style="margin-top: 10px;">
            <div id="map-preview" style="margin: 15px 0;"></div>

            <h3>Factions / Kingdoms / Crews</h3>
            <button class="primary-btn" onclick="addFaction()">Add Faction</button>
            <div id="factions-list" class="grid-3" style="margin-bottom: 30px;"></div>
        </div>

        <div id="section-chapters" class="section-panel">
            <h2>Arcs & Chapters</h2>
            <p style="color: var(--text-muted); margin-bottom: 15px;">Max 30 arcs, 20 chapters per arc.</p>
            <button class="primary-btn" onclick="addArc()">Create New Arc</button>
            <div id="arcs-list"></div>
        </div>

        <div id="section-timeline" class="section-panel">
            <h2>Visual Story Timeline</h2>
            <button class="primary-btn" onclick="addTimelineEvent()">Add Historic Event</button>
            <div id="timeline-list" class="timeline-container"></div>
        </div>

        <div id="section-themes" class="section-panel">
            <h2>Themes</h2>
            <button class="primary-btn" onclick="addTheme()">Create Theme</button>
            <div id="themes-list" class="grid-3"></div>
        </div>

        <div id="section-ideas" class="section-panel">
            <h2>Scrapbook of Ideas</h2>
            <button class="primary-btn" onclick="addIdea()">Jot Down an Idea</button>
            <div id="ideas-list" class="grid-3"></div>
        </div>
    </div>

    <script>
        // Database template 
        let appData = {
            activeStoryIndex: 0,
            stories: []
        };

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('melbol_story_planner_data');
            if (saved) {
                appData = JSON.parse(saved);
            } else {
                // Seed empty initial story
                appData.stories = [{
                    title: "My First Story",
                    genre: "Fantasy",
                    summary: "An epic adventure begins...",
                    cover: "",
                    characters: [],
                    factions: [],
                    map: "",
                    arcs: [],
                    timeline: [],
                    themes: [],
                    ideas: []
                }];
                saveData();
            }
            populateStorySelect();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('melbol_story_planner_data', JSON.stringify(appData));
        }

        function getActiveStory() {
            return appData.stories[appData.activeStoryIndex] || appData.stories[0];
        }

        function populateStorySelect() {
            const select = document.getElementById('active-story-select');
            select.innerHTML = '';
            appData.stories.forEach((story, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = story.title;
                if (idx === appData.activeStoryIndex) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function changeActiveStory(index) {
            appData.activeStoryIndex = parseInt(index);
            saveData();
            renderAll();
        }

        // Navigation
        function switchSection(sectionId) {
            document.querySelectorAll('.section-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`section-${sectionId}`).classList.add('active');
            event.target.classList.add('active');
            
            document.getElementById('current-section-title').textContent = sectionId.charAt(0).toUpperCase() + sectionId.slice(1);
        }

        // Image helper to handle local file upload as base64
        function handleImageUpload(event, callback) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                callback(reader.result);
            }
            if (file) reader.readAsDataURL(file);
        }

        /* ------------------ SECTION RENDERING ------------------ */

        function renderAll() {
            renderStories();
            renderCharacters();
            renderWorldbuilding();
            renderChapters();
            renderTimeline();
            renderThemes();
            renderIdeas();
        }

        // 1. Stories
        function renderStories() {
            const list = document.getElementById('stories-list');
            list.innerHTML = '';
            appData.stories.forEach((story, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <h3>${story.title}</h3>
                    <p><strong>Genre:</strong> ${story.genre}</p>
                    <p>${story.summary}</p>
                    ${story.cover ? `<img src="${story.cover}" style="margin-top:10px;">` : ''}
                    <input type="file" accept="image/*" onchange="updateStoryCover(${idx}, event)" style="margin-top:10px;">
                    <button class="delete-btn" onclick="deleteStory(${idx})">Delete Story</button>
                `;
                list.appendChild(card);
            });
        }

        function openStoryModal() {
            if (appData.stories.length >= 5) {
                alert("You can only have up to 5 stories at a time!");
                return;
            }
            const title = prompt("Enter Story Title:");
            if (!title) return;
            const genre = prompt("Enter Genre:");
            const summary = prompt("Enter a brief Summary:");
            
            appData.stories.push({
                title, genre, summary, cover: "",
                characters: [], factions: [], map: "", arcs: [], timeline: [], themes: [], ideas: []
            });
            saveData();
            populateStorySelect();
            renderAll();
        }

        function updateStoryCover(idx, event) {
            handleImageUpload(event, (base64Img) => {
                appData.stories[idx].cover = base64Img;
                saveData();
                renderStories();
            });
        }

        function deleteStory(idx) {
            if (appData.stories.length <= 1) {
                alert("You must keep at least one story!");
                return;
            }
            if (confirm("Are you sure you want to delete this story?")) {
                appData.stories.splice(idx, 1);
                appData.activeStoryIndex = 0;
                saveData();
                populateStorySelect();
                renderAll();
            }
        }

        // 2. Characters
        function renderCharacters() {
            const list = document.getElementById('characters-list');
            list.innerHTML = '';
            const story = getActiveStory();
            if (!story) return;

            story.characters.forEach((char, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <h3>${char.name || "Unnamed Character"}</h3>
                    ${char.img ? `<img src="${char.img}">` : ''}
                    <input type="file" accept="image/*" onchange="updateCharImg(${idx}, event)" style="margin-top:5px;">
                    <p><strong>Role:</strong> ${char.role || 'N/A'}</p>
                    <textarea placeholder="Hirohiko Araki style traits (e.g., Habits, Quirks, Backstory, Fears...)" onchange="updateCharBio(${idx}, this.value)">${char.bio || ''}</textarea>
                    <button class="delete-btn" onclick="deleteCharacter(${idx})">Delete</button>
                `;
                list.appendChild(card);
            });
        }

        function addCharacter() {
            const story = getActiveStory();
            const name = prompt("Character Name:");
            if (!name) return;
            story.characters.push({ name, role: 'Protagonist', bio: '', img: '' });
            saveData();
            renderCharacters();
        }

        function updateCharImg(idx, event) {
            handleImageUpload(event, (base64Img) => {
                getActiveStory().characters[idx].img = base64Img;
                saveData();
                renderCharacters();
            });
        }

        function updateCharBio(idx, text) {
            getActiveStory().characters[idx].bio = text;
            saveData();
        }

        function deleteCharacter(idx) {
            getActiveStory().characters.splice(idx, 1);
            saveData();
            renderCharacters();
        }

        // 3. Worldbuilding (Factions & Maps)
        function renderWorldbuilding() {
            const story = getActiveStory();
            if (!story) return;

            const list = document.getElementById('factions-list');
            list.innerHTML = '';
            story.factions.forEach((f, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <h3>${f.name}</h3>
                    <p><strong>Type:</strong> ${f.type}</p>
                    <p><strong>Leader:</strong> ${f.leader}</p>
                    <p><strong>Power Scale:</strong> ${f.power}</p>
                    <button class="delete-btn" onclick="deleteFaction(${idx})">Delete</button>
                `;
                list.appendChild(card);
            });

            const mapDiv = document.getElementById('map-preview');
            if (story.map) {
                mapDiv.innerHTML = `<img src="${story.map}" style="max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid var(--border-color);">`;
            } else {
                mapDiv.innerHTML = `<p style="color:var(--text-muted)">No map uploaded yet.</p>`;
            }
        }

        function uploadMap(event) {
            handleImageUpload(event, (base64Img) => {
                getActiveStory().map = base64Img;
                saveData();
                renderWorldbuilding();
            });
        }

        function addFaction() {
            const story = getActiveStory();
            const name = prompt("Faction/Kingdom Name:");
            if (!name) return;
            const type = prompt("Type (Kingdom, Crew, Country, etc.):");
            const leader = prompt("Leader Name:");
            const power = prompt("Power level (Weak, Medium, Strong):");

            story.factions.push({ name, type, leader, power });
            saveData();
            renderWorldbuilding();
        }

        function deleteFaction(idx) {
            getActiveStory().factions.splice(idx, 1);
            saveData();
            renderWorldbuilding();
        }

        // 4. Chapters & Arcs
        function renderChapters() {
            const list = document.getElementById('arcs-list');
            list.innerHTML = '';
            const story = getActiveStory();
            if (!story) return;

            story.arcs.forEach((arc, arcIdx) => {
                const arcDiv = document.createElement('div');
                arcDiv.className = "card";
                arcDiv.style.marginBottom = "20px";
                arcDiv.innerHTML = `
                    <h3>Arc ${arcIdx + 1}: ${arc.title}</h3>
                    <p style="margin-bottom: 10px;"><em>${arc.summary}</em></p>
                    <button class="primary-btn" style="padding: 5px 10px; font-size: 0.8rem;" onclick="addChapter(${arcIdx})">+ Add Chapter</button>
                    <button class="delete-btn" style="margin-left: 10px;" onclick="deleteArc(${arcIdx})">Delete Arc</button>
                    <div id="arc-${arcIdx}-chapters" style="margin-top: 15px; padding-left: 15px; border-left: 2px solid var(--border-color);"></div>
                `;
                list.appendChild(arcDiv);

                const chapList = document.getElementById(`arc-${arcIdx}-chapters`);
                arc.chapters.forEach((chap, chapIdx) => {
                    const chapDiv = document.createElement('div');
                    chapDiv.style.margin = "10px 0";
                    chapDiv.innerHTML = `
                        <strong>Ch ${chapIdx + 1}:</strong> ${chap.title} 
                        ${chap.link ? `<a href="${chap.link}" target="_blank" style="color: var(--accent-color); margin-left: 10px;">[Google Doc/Slide Link]</a>` : ''}
                        <button class="delete-btn" style="padding: 2px 6px; font-size:0.7rem; margin-left:10px;" onclick="deleteChapter(${arcIdx}, ${chapIdx})">X</button>
                    `;
                    chapList.appendChild(chapDiv);
                });
            });
        }

        function addArc() {
            const story = getActiveStory();
            if (story.arcs.length >= 30) {
                alert("Max 30 arcs reached!");
                return;
            }
            const title = prompt("Arc Title:");
            if (!title) return;
            const summary = prompt("Arc Summary:");

            story.arcs.push({ title, summary, chapters: [] });
            saveData();
            renderChapters();
        }

        function addChapter(arcIdx) {
            const story = getActiveStory();
            const arc = story.arcs[arcIdx];
            if (arc.chapters.length >= 20) {
                alert("Max 20 chapters per arc reached!");
                return;
            }
            const title = prompt("Chapter Title:");
            if (!title) return;
            const link = prompt("Paste link to Google Doc or Slide:");

            arc.chapters.push({ title, link });
            saveData();
            renderChapters();
        }

        function deleteArc(idx) {
            getActiveStory().arcs.splice(idx, 1);
            saveData();
            renderChapters();
        }

        function deleteChapter(arcIdx, chapIdx) {
            getActiveStory().arcs[arcIdx].chapters.splice(chapIdx, 1);
            saveData();
            renderChapters();
        }

        // 5. Timeline
        function renderTimeline() {
            const list = document.getElementById('timeline-list');
            list.innerHTML = '';
            const story = getActiveStory();
            if (!story) return;

            story.timeline.sort((a,b) => a.order - b.order);

            story.timeline.forEach((event, idx) => {
                const item = document.createElement('div');
                item.className = "timeline-item";
                item.innerHTML = `
                    <h4>${event.title} (Time Order: ${event.order})</h4>
                    <p>${event.desc}</p>
                    <button class="delete-btn" onclick="deleteTimelineEvent(${idx})">Delete Event</button>
                `;
                list.appendChild(item);
            });
        }

        function addTimelineEvent() {
            const story = getActiveStory();
            const title = prompt("Event Title:");
            if (!title) return;
            const desc = prompt("Event Description:");
            const order = parseFloat(prompt("Enter order number (e.g. 1, 2, 2.5 for sequence):") || "1");

            story.timeline.push({ title, desc, order });
            saveData();
            renderTimeline();
        }

        function deleteTimelineEvent(idx) {
            getActiveStory().timeline.splice(idx, 1);
            saveData();
            renderTimeline();
        }

        // 6. Themes
        function renderThemes() {
            const list = document.getElementById('themes-list');
            list.innerHTML = '';
            const story = getActiveStory();
            if (!story) return;

            story.themes.forEach((t, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <h3>${t.title}</h3>
                    <p>${t.desc}</p>
                    <button class="delete-btn" onclick="deleteTheme(${idx})">Delete Theme</button>
                `;
                list.appendChild(card);
            });
        }

        function addTheme() {
            const story = getActiveStory();
            const title = prompt("Theme Name:");
            if (!title) return;
            const desc = prompt("Theme Description / how it fits the narrative:");

            story.themes.push({ title, desc });
            saveData();
            renderThemes();
        }

        function deleteTheme(idx) {
            getActiveStory().themes.splice(idx, 1);
            saveData();
            renderThemes();
        }

        // 7. Ideas
        function renderIdeas() {
            const list = document.getElementById('ideas-list');
            list.innerHTML = '';
            const story = getActiveStory();
            if (!story) return;

            story.ideas.forEach((idea, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <h3>${idea.title}</h3>
                    <p>${idea.content}</p>
                    <button class="delete-btn" onclick="deleteIdea(${idx})">Delete Idea</button>
                `;
                list.appendChild(card);
            });
        }

        function addIdea() {
            const story = getActiveStory();
            const title = prompt("Idea Headline:");
            if (!title) return;
            const content = prompt("Describe your idea / character concept:");

            story.ideas.push({ title, content });
            saveData();
            renderIdeas();
        }

        function deleteIdea(idx) {
            getActiveStory().ideas.splice(idx, 1);
            saveData();
            renderIdeas();
        }

        // Initialize App on load
        window.onload = loadData;
    </script>
</body>
</html>
